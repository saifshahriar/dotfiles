#!C:\Users\Dell\.config\starship.toml

command_timeout = 500
format = "[ SAIF😼Dell](bold yellow bg:green)[](green) $directory$git_branch$cmd_duration$all$character"

[line_break]
disabled = true

[character]
success_symbol = "[➜](bold green) "
error_symbol = "[✗](bold red) "

[cmd_duration]
min_time = 500
format = "took [$duration](bold yellow) "

[directory]
read_only = " "
truncation_length = 3
truncation_symbol = "~/"

[git_branch]
symbol = "  "
style = "bold #e8ec00 inverted"
format = "on [$symbol$branch ]($style) "

